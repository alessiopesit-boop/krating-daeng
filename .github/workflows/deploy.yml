name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (production, base-href per Pages)
        run: npm run build -- --base-href=/krating-daeng/ --configuration=production

      # GitHub Pages serve solo file statici; per garantire che route hash e
      # deep link funzionino sempre, copiamo index.html anche su 404.html.
      - name: SPA fallback (404.html)
        run: cp dist/krating-daeng/browser/index.html dist/krating-daeng/browser/404.html

      - name: Disable Jekyll
        run: touch dist/krating-daeng/browser/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/krating-daeng/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
