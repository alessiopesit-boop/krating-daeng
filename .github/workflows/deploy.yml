name: Deploy to GitHub Pages

# Deploy solo su Release pubblicata: il sito live coincide sempre con un tag
# (la versione mostrata nel footer e' sempre quella effettivamente in produzione).
# workflow_dispatch resta come fallback manuale per emergenze o anteprime
# straordinarie da main (non per uso quotidiano).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (production, base-href per Pages)
        run: npm run build -- --base-href=/krating-daeng/ --configuration=production

      # public/404.html (commit nel repo) viene gia' copiato come asset da
      # Angular. Fa redirect a /krating-daeng/#/<path> cosi' gli URL inesistenti
      # arrivano alla route catch-all e mostrano la NotFoundComponent.
      - name: Disable Jekyll
        run: touch dist/krating-daeng/browser/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/krating-daeng/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
