name: Backfill release v1.0.0

# Workflow una tantum. Si lancia a mano dalla tab Actions per riempire la
# descrizione della GitHub Release v1.0.0 (creata prima di adottare
# release-please) usando il contenuto della sezione [1.0.0] di CHANGELOG.md.
# Una volta eseguito, il file puo' essere cancellato.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PATCH della Release v1.0.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, re, sys, urllib.request

          with open("CHANGELOG.md", "r", encoding="utf-8") as f:
              text = f.read()
          m = re.search(
              r"##\s*\[1\.0\.0\][^\n]*\n(.*?)(?=\n##\s*\[|\Z)",
              text,
              re.S,
          )
          if not m:
              print("Sezione [1.0.0] non trovata in CHANGELOG.md.")
              sys.exit(1)
          body = m.group(1).strip()
          if not body:
              print("Sezione [1.0.0] vuota.")
              sys.exit(1)

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          # Risolvi id della release dal tag.
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases/tags/v1.0.0",
              headers=headers,
          )
          rel = json.loads(urllib.request.urlopen(req).read())
          rid = rel["id"]

          patch = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases/{rid}",
              data=json.dumps({"body": body}).encode(),
              method="PATCH",
              headers={**headers, "Content-Type": "application/json"},
          )
          urllib.request.urlopen(patch).read()
          print(f"Release v1.0.0 (id={rid}) aggiornata, {len(body)} caratteri di body.")
          PY
