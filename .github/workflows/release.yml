name: Release please

# workflow_dispatch utile quando vuoi "rilanciare" release-please senza un
# nuovo commit (per esempio dopo aver aggiornato secret/PAT del repo: un rerun
# dei run vecchi riusa i secret cached, mentre un nuovo run rilegge tutto).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # PAT (RELEASE_PLEASE_TOKEN) invece del GITHUB_TOKEN automatico:
          # cosi' la GitHub Release pubblicata da release-please propaga
          # l'evento "release: published" e fa partire deploy.yml. Con il
          # GITHUB_TOKEN GitHub blocca la propagazione (anti-loop).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Da qui in poi: solo se release-please ha appena creato una Release
      # (cioe' la Release PR e' stata mergiata in questo push).
      - name: Checkout (full history per leggere i body dei commit)
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Riscrivi il body della GitHub Release con descrizioni discorsive
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RELEASE_ID: ${{ steps.release.outputs.id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          # Tag precedente in ordine semver decrescente, escluso quello corrente.
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG_NAME}$" | head -1 || true)
          if [ -z "${PREV_TAG}" ]; then
            RANGE="${TAG_NAME}"
          else
            RANGE="${PREV_TAG}..${TAG_NAME}"
          fi
          echo "Range commit: ${RANGE}"

          python3 - "$RANGE" <<'PY'
          import json, os, re, subprocess, sys, urllib.request

          rng = sys.argv[1]
          raw = subprocess.check_output(
              ["git", "log", "--format=%H%x00%s%x00%b%x1e", "--reverse", rng],
              text=True,
          )

          # Tipi rilasciabili che appaiono nelle note, con etichetta del gruppo.
          GROUPS = [
              ("feat", "Novita'"),
              ("fix", "Correzioni"),
              ("perf", "Performance"),
              ("refactor", "Refactor"),
          ]
          GROUP_BY_TYPE = dict(GROUPS)

          subject_re = re.compile(
              r"^(?P<type>[a-z]+)(?P<scope>\([^)]+\))?(?P<bang>!)?:\s*(?P<short>.+)$",
              re.IGNORECASE,
          )

          def unwrap_paragraphs(text):
              """Trasforma i wrap "git-style" a 70 chars in paragrafi fluidi.
              GitHub Flavored Markdown rende i newline singoli come <br>, quindi
              senza unwrap ogni capoverso "spezzato" del commit diventa visibile
              come riga corta. Qui collassiamo i singoli newline in spazi e
              preserviamo solo i doppi newline (paragraph break).
              """
              text = text.strip()
              if not text:
                  return ""
              # Marker temporaneo per i paragraph break (doppio newline o piu').
              text = re.sub(r"\n[ \t]*\n+", "\x1f", text)
              # Resto: ogni newline singolo diventa spazio.
              text = re.sub(r"[ \t]*\n[ \t]*", " ", text)
              # Collassa eventuali spazi consecutivi.
              text = re.sub(r" {2,}", " ", text)
              # Ripristina i paragraph break.
              return text.replace("\x1f", "\n\n").strip()

          def humanize(short_text):
              """Capitalizza la prima lettera del subject ripulito."""
              s = short_text.strip()
              return s[0].upper() + s[1:] if s else ""

          buckets = {label: [] for _, label in GROUPS}
          breaking = []

          for entry in raw.split("\x1e"):
              entry = entry.lstrip("\n")
              if not entry.strip():
                  continue
              parts = entry.split("\x00", 2)
              if len(parts) < 3:
                  continue
              _sha, subject, body = parts
              subject = subject.strip()
              body = body.strip()
              # Salta i commit di release-please.
              if subject.lower().startswith("chore(main): release"):
                  continue
              m = subject_re.match(subject)
              if not m:
                  continue
              ctype = m.group("type").lower()
              short_human = humanize(m.group("short"))

              # Estrai eventuale BREAKING CHANGE dal body (trailer git).
              body_lines = []
              breaking_lines = []
              for line in body.splitlines():
                  if line.startswith("BREAKING CHANGE:"):
                      breaking_lines.append(line.split(":", 1)[1].strip())
                  else:
                      body_lines.append(line)
              body_clean = unwrap_paragraphs("\n".join(body_lines))

              # Composizione della voce: titoletto "umano" + body discorsivo.
              # Se manca uno dei due, ricadiamo sull'altro.
              heading = f"### {short_human}" if short_human else ""
              if heading and body_clean:
                  voice = f"{heading}\n\n{body_clean}"
              elif heading:
                  voice = heading
              elif body_clean:
                  voice = body_clean
              else:
                  voice = ""

              if not voice:
                  continue

              # Breaking change: in cima, oltre che nel gruppo originale.
              is_breaking = bool(m.group("bang")) or bool(breaking_lines)
              if is_breaking:
                  br_text = breaking_lines[0] if breaking_lines else body_clean or short_human
                  if short_human and br_text != short_human:
                      breaking.append(f"### {short_human}\n\n{br_text}")
                  else:
                      breaking.append(br_text)

              label = GROUP_BY_TYPE.get(ctype)
              if label is not None:
                  buckets[label].append(voice)

          sections = []
          if breaking:
              sections.append("## Modifiche incompatibili\n\n" + "\n\n".join(breaking))
          for _t, label in GROUPS:
              if buckets[label]:
                  sections.append(f"## {label}\n\n" + "\n\n".join(buckets[label]))

          if not sections:
              print("Nessuna voce da pubblicare, lascio il body di release-please.")
              sys.exit(0)

          new_body = "\n\n".join(sections).rstrip() + "\n"

          repo = os.environ["REPO"]
          rid = os.environ["RELEASE_ID"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          }
          patch = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases/{rid}",
              data=json.dumps({"body": new_body}).encode(),
              method="PATCH",
              headers=headers,
          )
          urllib.request.urlopen(patch).read()
          total = sum(len(v) for v in buckets.values())
          print(f"Release body riscritto con {total} voci ({len(breaking)} breaking).")
          PY
