name: Setup repository

# Workflow manuale che configura le impostazioni del repository in linea con
# le convenzioni del progetto: solo squash merge, default commit message =
# titolo PR, auto-delete dei branch al merge, branch protection su main
# (PR obbligatoria, niente force-push, niente eliminazione).
#
# Si lancia da Actions > Setup repository > Run workflow. Idempotente: puoi
# rilanciarlo ogni volta che qualcuno tocca le impostazioni a mano e si
# riallinea.

on:
  workflow_dispatch:

permissions:
  contents: read
  administration: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Merge strategy, default commit message, auto-delete branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          }
          payload = {
              "allow_squash_merge": True,
              "allow_merge_commit": False,
              "allow_rebase_merge": False,
              "allow_auto_merge": True,
              "delete_branch_on_merge": True,
              # Quando squashi, il commit su main eredita titolo e body dalla PR:
              # perfetto per Conventional Commits e per release-please.
              "squash_merge_commit_title": "PR_TITLE",
              "squash_merge_commit_message": "PR_BODY",
          }
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}",
              data=json.dumps(payload).encode(),
              method="PATCH",
              headers=headers,
          )
          urllib.request.urlopen(req).read()
          print("Repo settings aggiornati.")
          PY

      - name: Branch protection su main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          }
          # PR obbligatoria su main, 0 approve richiesti (sei da solo), no force
          # push, no eliminazione del branch, storia lineare (compatibile con
          # squash merge). enforce_admins lasciato a false cosi' puoi sempre
          # sbloccarti in emergenza.
          payload = {
              "required_status_checks": None,
              "enforce_admins": False,
              "required_pull_request_reviews": {
                  "required_approving_review_count": 0,
                  "dismiss_stale_reviews": False,
                  "require_code_owner_reviews": False,
              },
              "restrictions": None,
              "required_linear_history": True,
              "allow_force_pushes": False,
              "allow_deletions": False,
              "block_creations": False,
              "required_conversation_resolution": False,
              "lock_branch": False,
              "allow_fork_syncing": True,
          }
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/branches/main/protection",
              data=json.dumps(payload).encode(),
              method="PUT",
              headers=headers,
          )
          urllib.request.urlopen(req).read()
          print("Branch protection su main applicata.")
          PY
